<section class="space-y-6 animate-slide-up max-w-2xl">
  <div class="flex items-start justify-between gap-4">
    <div>
      <p class="text-sm text-text-muted">Abertura de lote</p>
      <h1 class="mt-1 text-2xl font-bold text-text-primary">Novo lote de produção</h1>
    </div>
    <a routerLink="/app/lotes" class="btn-secondary text-sm px-4 py-2">Voltar</a>
  </div>

  @if (loading()) {
    <div class="glass-card rounded-2xl p-6 text-text-muted">Carregando formulário...</div>
  }

  @if (error()) {
    <div class="rounded-2xl p-4 text-sm" style="background:rgba(198,40,40,0.1); border:1px solid rgba(198,40,40,0.3); color:#EF9A9A;">
      {{ error() }}
    </div>
  }

  <div class="glass-card rounded-2xl p-6">
    <div class="grid gap-4 md:grid-cols-2">
      <div>
        <label class="form-label">Produto</label>
        <select [ngModel]="form.produtoId" (ngModelChange)="onProdutoChange($event)"
          [disabled]="loading() || saving()" class="input-field">
          <option value="">Selecione um produto</option>
          @for (produto of produtos(); track produto.id) {
            <option [value]="produto.id">{{ produto.nome }} ({{ produto.codigo }})</option>
          }
        </select>
      </div>

      <div>
        <label class="form-label">Data de produção</label>
        <input [(ngModel)]="form.dataProducao" [disabled]="saving()" type="date" class="input-field" />
      </div>

      <div>
        <label class="form-label">Turno</label>
        <select [(ngModel)]="form.turno" [disabled]="saving()" class="input-field">
          @for (turno of turnoOptions; track turno.value) {
            <option [value]="turno.value">{{ turno.label }}</option>
          }
        </select>
      </div>

      <div>
        <label class="form-label">Linha</label>
        <input [(ngModel)]="form.linha" [disabled]="saving()" type="text" class="input-field"
               placeholder="Ex: Linha SMT 01" />
      </div>

      <div>
        <label class="form-label">Quantidade produzida</label>
        <input [(ngModel)]="form.quantidadeProd" [disabled]="saving()" type="number" min="1"
               class="input-field" placeholder="Ex: 350" />
      </div>

      <div class="md:col-span-2">
        <label class="form-label">Observações</label>
        <textarea [(ngModel)]="form.observacoes" [disabled]="saving()" rows="4" class="input-field resize-none"
                  placeholder="Informações adicionais sobre o lote"></textarea>
      </div>
    </div>

    <div class="mt-6 flex justify-end">
      <button type="button" (click)="salvar()" [disabled]="saving() || loading()" class="btn-primary px-6 py-2">
        @if (saving()) {
          <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          Salvando...
        } @else {
          Abrir lote
        }
      </button>
    </div>
  </div>
</section>
